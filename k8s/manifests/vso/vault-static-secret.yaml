apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: db-secret
spec:
  vaultAuthRef: vault-auth
  mount: demo-kv
  type: kv-v2
  path: app/db
  refreshAfter: 30s
  destination:
    name: db-secret
    create: true
  # app.py reads creds from os.environ at container start and can't hot-reload
  # a rotated secret — trigger a rolling restart on change so the app picks up
  # a live Vault edit automatically instead of needing a manual restart.
  rolloutRestartTargets:
    - kind: Deployment
      name: demo-app
