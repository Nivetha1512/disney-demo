# Set these as repo variables under Settings > Secrets and variables >
# Actions > Variables (none of these are secrets):
#   VAULT_ADDR, VAULT_NAMESPACE, AWS_REGION, AWS_ACCOUNT_ID, ECR_REPOSITORY
name: Build and Push to ECR via Vault (OIDC)

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch short-lived AWS creds from Vault
        id: vault
        uses: hashicorp/vault-action@v3
        with:
          url: ${{ vars.VAULT_ADDR }}
          namespace: ${{ vars.VAULT_NAMESPACE }}
          method: jwt
          path: jwt-github
          role: ci-github-role
          secrets: |
            aws-ci/creds/ci-ecr-push access_key | AWS_ACCESS_KEY_ID ;
            aws-ci/creds/ci-ecr-push secret_key | AWS_SECRET_ACCESS_KEY ;
            aws-ci/creds/ci-ecr-push security_token | AWS_SESSION_TOKEN

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ${{ vars.AWS_REGION }} \
            | docker login --username AWS --password-stdin \
              ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com

      - name: Build and push image
        run: |
          IMAGE="${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/${{ vars.ECR_REPOSITORY }}:${{ github.sha }}"
          docker build -t "$IMAGE" app
          docker push "$IMAGE"
