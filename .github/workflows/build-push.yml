# Canonical copy of the workflow for this demo. The actual repo hosting the
# app is https://github.com/Nivetha1512/disney-demo — copy this file to
# .github/workflows/build-push.yml there (along with ci-cd/app/) and set the
# repo variables below under Settings > Secrets and variables > Actions >
# Variables (none of these are secrets, so repo variables, not secrets):
#   VAULT_ADDR, VAULT_NAMESPACE, AWS_REGION, AWS_ACCOUNT_ID, ECR_REPOSITORY
name: Build and Push to ECR via Vault (OIDC)

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch AWS creds from Vault
        id: vault
        uses: hashicorp/vault-action@v3
        with:
          url: ${{ vars.VAULT_ADDR }}
          namespace: ${{ vars.VAULT_NAMESPACE }}
          method: jwt
          path: jwt-github
          role: ci-github-role
          secrets: |
            demo1-kv/data/ci/aws access_key_id | AWS_ACCESS_KEY_ID ;
            demo1-kv/data/ci/aws secret_access_key | AWS_SECRET_ACCESS_KEY

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ${{ vars.AWS_REGION }} \
            | docker login --username AWS --password-stdin \
              ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com

      - name: Build and push image
        run: |
          IMAGE="${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/${{ vars.ECR_REPOSITORY }}:${{ github.sha }}"
          docker build -t "$IMAGE" ci-cd/app
          docker push "$IMAGE"
